<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Skylark · 7-Day Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Average+Sans&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Skylark" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    :root {
      --cream: #EBF0C8;
      --mint: #AED4B2;
      --teal: #6EAE9A;
      --indigo: #3B437A;
      --plum: #5E3C5C;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Average Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #2F6658 0%, #6EAE9A 55%);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: var(--indigo);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }

    .location {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      opacity: 0.85;
      font-size: 0.95rem;
    }

    .forecast {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin: 0 -0.5rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
      scroll-snap-type: x proximity;
    }

    .forecast::-webkit-scrollbar {
      height: 6px;
    }

    .forecast::-webkit-scrollbar-track {
      background: transparent;
    }

    .forecast::-webkit-scrollbar-thumb {
      background: var(--cream);
      border-radius: 5px;
    }

    .day-card {
      flex: 0 0 auto;
      width: calc((100% - 4.5rem) / 7);
      min-width: 120px;
      background: var(--cream);
      padding: 1.25rem 0.75rem;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
      scroll-snap-align: start;
      color: var(--indigo);
      border-radius: 14px;
    }

    .day-card.weekend {
      background: var(--mint);
    }

    .day-card:hover {
      background: var(--mint);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .day-card.weekend:hover {
      filter: brightness(0.94);
    }

    .day-card.selected {
      background: var(--indigo);
      color: var(--cream);
    }

    .day-card.selected .day-date,
    .day-card.selected .day-desc,
    .day-card.selected .temp-min {
      color: var(--mint);
    }

    .day-card.selected .temp-max {
      color: var(--cream);
    }

    .day-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .day-date {
      font-size: 0.75rem;
      color: var(--plum);
      margin-bottom: 0.75rem;
    }

    .day-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 0.5rem;
    }

    .day-temps {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .temp-max {
      font-weight: 600;
    }

    .temp-min {
      color: var(--plum);
    }

    .day-desc {
      font-size: 0.75rem;
      color: var(--plum);
      margin-top: 0.4rem;
      min-height: 2em;
    }

    .day-summary-btn {
      margin-top: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--indigo);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(59, 67, 122, 0.2);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .day-summary-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-1px);
    }

    .day-card.selected .day-summary-btn {
      background: rgba(235, 240, 200, 0.18);
      color: var(--cream);
      border-color: rgba(235, 240, 200, 0.35);
    }

    .day-card.selected .day-summary-btn:hover {
      background: rgba(235, 240, 200, 0.32);
    }

    .summary-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(30, 35, 55, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      z-index: 1000;
      opacity: 0;
      animation: summaryFadeIn 0.18s ease forwards;
    }

    @keyframes summaryFadeIn {
      to { opacity: 1; }
    }

    .summary-modal {
      background: var(--cream);
      color: var(--indigo);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      max-width: 520px;
      width: 100%;
      padding: 1.75rem;
      transform: translateY(8px);
      animation: summarySlideIn 0.22s ease forwards;
    }

    @keyframes summarySlideIn {
      to { transform: translateY(0); }
    }

    .summary-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .summary-modal-title {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .summary-modal-close {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--plum);
      padding: 0.25rem;
      border-radius: 8px;
      font-family: inherit;
      line-height: 0;
    }

    .summary-modal-close:hover {
      background: rgba(94, 60, 92, 0.12);
      color: var(--indigo);
    }

    .summary-modal-body {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--indigo);
    }

    .summary-modal-body p + p {
      margin-top: 0.75rem;
    }

    .status {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.1rem;
    }

    .detail-panel {
      background: var(--cream);
      padding: 1.5rem;
      margin-top: 1.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      color: var(--indigo);
      border-radius: 18px;
    }

    .detail-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .detail-panel-title {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .detail-panel-stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      color: var(--plum);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--indigo);
    }

    .hourly-scroll {
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin: 0 -0.5rem;
    }

    .hourly-row {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.5rem;
      min-width: min-content;
    }

    .hour-card {
      flex: 0 0 auto;
      width: 92px;
      padding: 0.9rem 0.5rem;
      text-align: center;
      background: var(--mint);
      border: 1px solid var(--teal);
      color: var(--indigo);
      border-radius: 12px;
    }

    .hour-card.now {
      background: var(--indigo);
      color: var(--cream);
      border-color: var(--indigo);
    }

    .hour-card.now .hour-precip {
      color: var(--mint);
    }

    .hour-card.now .hour-wind {
      color: var(--mint);
    }

    .hour-time {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .hour-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 0.4rem;
    }

    .hour-temp {
      font-size: 1rem;
      font-weight: 600;
    }

    .hour-feels {
      font-size: 0.7rem;
      color: var(--plum);
      margin-top: 0.15rem;
      min-height: 1em;
    }

    .hour-card.now .hour-feels {
      color: var(--mint);
    }

    .hour-card.day-jump {
      background: var(--cream);
      border-color: var(--teal);
      color: var(--indigo);
      cursor: pointer;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .hour-card.day-jump:hover {
      background: var(--mint);
    }

    .day-jump-arrow {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1;
    }

    .day-jump-label {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .precip-bar.placeholder {
      background: transparent;
    }

    .precip-bars {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.5rem;
      min-width: min-content;
      margin-bottom: 0.35rem;
      align-items: flex-end;
    }

    .precip-bar {
      flex: 0 0 auto;
      width: 92px;
      height: 20px;
      background: rgba(87, 114, 103, 0.15);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }

    .precip-bar::after {
      content: '';
      position: absolute;
      left: 2px;
      right: 2px;
      bottom: 0;
      height: var(--p, 0%);
      background: #3B82F6;
      opacity: 0.7;
      border-radius: 2px;
    }

    .hour-metric {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      font-size: 0.72rem;
      margin-top: 0.3rem;
      min-height: 1em;
    }

    .hour-precip {
      color: var(--plum);
    }

    .hour-wind {
      color: var(--plum);
    }

    .hour-metric svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }

    .advisor {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border: 1px solid transparent;
      border-radius: 14px;
    }

    .advisor+.detail-panel-header {
      margin-top: 1.25rem;
    }

    .advisor.yes {
      background: #CFE4D3;
      border-color: #7FA889;
      color: #2F5D3E;
    }

    .advisor.no {
      background: #E6CFCB;
      border-color: #B88681;
      color: #8A3D35;
    }

    .advisor.frost {
      background: #D6E4EE;
      border-color: #7EA3C2;
      color: #2D4E6B;
    }

    .advisor.uv {
      background: #F4E4B5;
      border-color: #C9A84B;
      color: #7A5A1F;
    }

    .advisor-icon {
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .advisor-title {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .advisor-reason {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 0.15rem;
    }

    .hourly-scroll::-webkit-scrollbar {
      height: 6px;
    }

    .hourly-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .hourly-scroll::-webkit-scrollbar-thumb {
      background: var(--teal);
      border-radius: 5px;
    }

    .error {
      background: var(--cream);
      padding: 2rem;
      text-align: center;
      color: var(--indigo);
      border-radius: 14px;
    }

    .error-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .error button {
      padding: 0.6rem 1.4rem;
      background: var(--indigo);
      color: var(--cream);
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 10px;
    }

    .error button:hover {
      background: var(--plum);
    }

    .location-btn {
      background: var(--indigo);
      color: var(--cream);
      border: none;
      padding: 0.75rem 1.1rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s ease, background 0.2s ease;
      border-radius: 10px;
    }

    .location-btn:hover {
      background: var(--plum);
      transform: translateY(-2px);
    }

    .location-btn.secondary {
      background: var(--cream);
      color: var(--indigo);
    }

    .location-btn.secondary:hover {
      background: var(--mint);
    }

    .location-btn[hidden] {
      display: none;
    }

    .location-btn[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .brand {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: #ffffff;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
    }

    .brand-name {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .brand-tagline {
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.9;
      letter-spacing: 0.04em;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
    }

    @media (max-width: 600px) {
      .brand {
        top: 0.65rem;
        left: 0.75rem;
        gap: 0.5rem;
      }

      .brand-name {
        font-size: 1.1rem;
      }

      .brand-tagline {
        font-size: 0.75rem;
      }

      .brand-logo {
        width: 38px;
        height: 38px;
      }
    }

    .search-controls {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .search-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .location-btn.icon-btn {
      padding: 0.6rem;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-panel {
      background: var(--cream);
      padding: 0.75rem;
      width: 280px;
      max-width: 90vw;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .search-panel input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--teal);
      background: white;
      color: var(--indigo);
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 10px;
      outline: none;
    }

    .search-panel input:focus {
      border-color: var(--plum);
    }

    #search-results {
      margin-top: 0.5rem;
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .search-result {
      text-align: left;
      padding: 0.5rem 0.7rem;
      background: transparent;
      border: none;
      color: var(--indigo);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 8px;
    }

    .search-result:hover,
    .search-result:focus {
      background: var(--mint);
      outline: none;
    }

    .search-result strong {
      font-weight: 600;
    }

    .search-result span {
      font-size: 0.75rem;
      color: var(--plum);
    }

    .search-status {
      padding: 0.5rem 0.7rem;
      font-size: 0.85rem;
      color: var(--plum);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .header {
      animation: fade-up 0.5s ease-out both;
    }

    .forecast {
      animation: fade-up 0.5s ease-out both;
      animation-delay: 0.08s;
    }

    .day-card {
      animation: fade-up 0.45s ease-out both;
      animation-delay: calc(0.12s + var(--stagger, 0) * 45ms);
    }

    .detail-panel {
      animation: fade-up 0.5s ease-out both;
      animation-delay: 0.2s;
    }

    .detail-panel-header,
    .hourly-scroll,
    .advisor,
    .dress-me {
      animation: fade-in 0.35s ease-out both;
    }

    .precip-bar::after {
      transition: height 0.4s ease-out;
    }

    .dress-me {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 0.75rem 1.25rem;
      margin-top: 1rem;
      background: var(--mint);
      color: var(--indigo);
      border-radius: 14px;
    }

    .dress-me-figure {
      flex-shrink: 0;
      width: 72px;
      height: 100px;
    }

    .dress-me-figure svg {
      width: 100%;
      height: 100%;
      animation: bob 3.5s ease-in-out infinite;
    }

    .dress-me-title {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .dress-me-caption {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 0.2rem;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-3px);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 600px) {
      .forecast {
        gap: 0.4rem;
      }

      .day-card {
        width: 96px;
        min-width: 96px;
        padding: 0.6rem 0.3rem;
      }

      .day-card .day-icon {
        width: 36px;
        height: 36px;
        margin: 0.3rem auto 0;
      }

      .day-card .day-temps {
        font-size: 0.85rem;
        margin-top: 0.3rem;
      }

      .day-card .temp-min,
      .day-card .day-desc {
        display: none;
      }

      .location {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="brand" aria-label="Skylark Weather">
    <svg class="brand-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="56" cy="9" r="6" fill="#FFC107" />

      <path d="M22 40 L3 53 L6 56 L24 43 Z" fill="#EBF0C8" />
      <path d="M22 40 L8 50 L10 53 L24 42 Z" fill="#ffffff" />

      <path d="M18 41 C18 28 30 22 42 22 C51 22 53 32 47 39 C39 45 22 47 18 41 Z" fill="#EBF0C8" />
      <path d="M22 40 C22 30 30 25 41 25 C48 25 50 32 45 38 C38 42 25 44 22 40 Z" fill="#ffffff" />

      <circle cx="45" cy="23" r="9" fill="#EBF0C8" />
      <circle cx="45" cy="22" r="8" fill="#ffffff" />

      <path d="M42 14 Q44 9 48 13 Q45 15 42 14 Z" fill="#ffffff" />

      <path d="M53 22 L62 23 L53 26 Z" fill="#FFC107" />

      <circle cx="47" cy="21" r="1.7" fill="#3B437A" />
      <circle cx="47.5" cy="20.5" r="0.5" fill="#ffffff" />

      <path d="M22 32 Q16 8 38 14 Q42 24 38 32 Q30 36 22 32 Z" fill="#EBF0C8" />
      <path d="M25 31 Q21 13 36 18 Q40 25 36 31 Q30 33 25 31 Z" fill="#ffffff" />
      <path d="M26 30 Q30 30 34 32" stroke="#AED4B2" stroke-width="0.7" fill="none" stroke-linecap="round" />
      <path d="M24 25 Q29 26 34 28" stroke="#AED4B2" stroke-width="0.7" fill="none" stroke-linecap="round" />
      <path d="M25 20 Q30 20 35 23" stroke="#AED4B2" stroke-width="0.7" fill="none" stroke-linecap="round" />
    </svg>
    <div class="brand-text">
      <span class="brand-name">Skylark</span>
      <span class="brand-tagline">Weather</span>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="location" id="location">Loading…</div>
      <div class="subtitle" id="subtitle">Fetching your local forecast</div>
    </div>
    <div id="content">
      <div class="status">Getting your location…</div>
    </div>
  </div>

  <div class="search-controls">
    <div class="search-buttons">
      <button id="btn-current" class="location-btn icon-btn secondary" type="button" aria-label="Back to my location" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="3" />
          <circle cx="12" cy="12" r="8" />
          <line x1="12" y1="2" x2="12" y2="4" />

      <button id="btn-search" class="location-btn icon-btn" type="button" aria-label="Search location">

  <script>
    const DROP_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 C12 2 5 11 5 15 A7 7 0 0 0 19 15 C19 11 12 2 12 2 Z"/></svg>`;
    const WIND_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8 H15 A3 3 0 1 0 12 5"/><path d="M3 14 H19 A3 3 0 1 1 16 17"/></svg>`;

    // WMO weather code → { label, icon (inline SVG) }
    // Icons are simple, clean SVGs drawn consistently.
    const svg = {
      sun: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="12" fill="#FFC107"/><g stroke="#FFC107" stroke-width="3" stroke-linecap="round"><line x1="32" y1="6" x2="32" y2="14"/><line x1="32" y1="50" x2="32" y2="58"/><line x1="6" y1="32" x2="14" y2="32"/><line x1="50" y1="32" x2="58" y2="32"/><line x1="13" y1="13" x2="19" y2="19"/><line x1="45" y1="45" x2="51" y2="51"/><line x1="13" y1="51" x2="19" y2="45"/><line x1="45" y1="19" x2="51" y2="13"/></g></svg>`,
      partly: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="22" cy="22" r="9" fill="#FFC107"/><g stroke="#FFC107" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="4" x2="22" y2="9"/><line x1="4" y1="22" x2="9" y2="22"/><line x1="9" y1="9" x2="13" y2="13"/><line x1="31" y1="13" x2="35" y2="9"/></g><path d="M20 44 Q20 34 30 34 Q34 28 42 30 Q52 30 52 40 Q58 42 56 50 Q54 56 46 56 L22 56 Q14 56 14 48 Q14 42 20 44 Z" fill="#E3E8F0" stroke="#94a3b8" stroke-width="1.5"/></svg>`,
      cloud: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 44 Q18 32 30 32 Q34 24 44 26 Q56 26 56 38 Q62 40 60 48 Q58 56 48 56 L20 56 Q10 56 10 46 Q10 40 18 44 Z" fill="#CBD5E1" stroke="#94a3b8" stroke-width="1.5"/></svg>`,
      fog: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 32 Q18 20 30 20 Q34 12 44 14 Q56 14 56 26 Q62 28 60 36 Q58 44 48 44 L20 44 Q10 44 10 34 Q10 28 18 32 Z" fill="#CBD5E1" stroke="#94a3b8" stroke-width="1.5"/><g stroke="#94a3b8" stroke-width="3" stroke-linecap="round"><line x1="10" y1="50" x2="54" y2="50"/><line x1="16" y1="56" x2="50" y2="56"/></g></svg>`,
      drizzle: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 32 Q18 20 30 20 Q34 12 44 14 Q56 14 56 26 Q62 28 60 36 Q58 44 48 44 L20 44 Q10 44 10 34 Q10 28 18 32 Z" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/><g stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="48" x2="20" y2="54"/><line x1="32" y1="48" x2="30" y2="54"/><line x1="42" y1="48" x2="40" y2="54"/></g></svg>`,
      rain: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 30 Q18 18 30 18 Q34 10 44 12 Q56 12 56 24 Q62 26 60 34 Q58 42 48 42 L20 42 Q10 42 10 32 Q10 26 18 30 Z" fill="#64748b" stroke="#475569" stroke-width="1.5"/><g stroke="#3B82F6" stroke-width="3" stroke-linecap="round"><line x1="20" y1="48" x2="16" y2="58"/><line x1="30" y1="48" x2="26" y2="58"/><line x1="40" y1="48" x2="36" y2="58"/><line x1="50" y1="48" x2="46" y2="58"/></g></svg>`,
      snow: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 30 Q18 18 30 18 Q34 10 44 12 Q56 12 56 24 Q62 26 60 34 Q58 42 48 42 L20 42 Q10 42 10 32 Q10 26 18 30 Z" fill="#CBD5E1" stroke="#94a3b8" stroke-width="1.5"/><g fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"><circle cx="20" cy="52" r="3"/><circle cx="32" cy="56" r="3"/><circle cx="44" cy="52" r="3"/></g></svg>`,
      thunder: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 30 Q18 18 30 18 Q34 10 44 12 Q56 12 56 24 Q62 26 60 34 Q58 42 48 42 L20 42 Q10 42 10 32 Q10 26 18 30 Z" fill="#475569" stroke="#334155" stroke-width="1.5"/><path d="M32 42 L24 56 L30 56 L28 62 L38 48 L32 48 L34 42 Z" fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/></svg>`
    };

    function describe(code) {
      const m = {
        0: ['Clear sky', svg.sun],
        1: ['Mainly clear', svg.partly],
        2: ['Partly cloudy', svg.partly],
        3: ['Overcast', svg.cloud],
        45: ['Fog', svg.fog],
        48: ['Rime fog', svg.fog],
        51: ['Light drizzle', svg.drizzle],
        53: ['Drizzle', svg.drizzle],
        55: ['Heavy drizzle', svg.drizzle],
        56: ['Freezing drizzle', svg.drizzle],
        57: ['Freezing drizzle', svg.drizzle],
        61: ['Light rain', svg.rain],
        63: ['Rain', svg.rain],
        65: ['Heavy rain', svg.rain],
        66: ['Freezing rain', svg.rain],
        67: ['Freezing rain', svg.rain],
        71: ['Light snow', svg.snow],
        73: ['Snow', svg.snow],
        75: ['Heavy snow', svg.snow],
        77: ['Snow grains', svg.snow],
        80: ['Rain showers', svg.rain],
        81: ['Rain showers', svg.rain],
        82: ['Violent showers', svg.rain],
        85: ['Snow showers', svg.snow],
        86: ['Snow showers', svg.snow],
        95: ['Thunderstorm', svg.thunder],
        96: ['Thunder w/ hail', svg.thunder],
        99: ['Thunder w/ hail', svg.thunder]
      };
      return m[code] || ['Unknown', svg.cloud];
    }

    function dayName(dateStr, idx) {
      if (idx === 0) return 'Today';
      const d = new Date(dateStr);
      return d.toLocaleDateString(undefined, {
        weekday: 'short'
      });
    }

    function shortDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric'
      });
    }

    const LOCATION_CACHE_KEY = 'weather-app-location';
    const LOCATION_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

    function getCachedLocation() {
      try {
        const raw = localStorage.getItem(LOCATION_CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (Date.now() - cached.timestamp > LOCATION_CACHE_TTL) return null;
        return cached;
      } catch {
        return null;
      }
    }

    function setCachedLocation(lat, lon, place) {
      try {
        localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify({
          lat,
          lon,
          place,
          timestamp: Date.now()
        }));
      } catch {
        /* storage unavailable, ignore */
      }
    }

    async function getPosition() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          const err = new Error('Geolocation not supported by this browser.');
          err.kind = 'location';
          reject(err);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          p => resolve({
            lat: p.coords.latitude,
            lon: p.coords.longitude
          }),
          e => {
            const err = new Error(e.code === 1 ?
              'Location access is blocked. On a phone, opening this file directly (file://) usually prevents location access — try searching for your city instead.' :
              'Couldn\'t get your location. Try searching for your city instead.');
            err.kind = 'location';
            reject(err);
          }, {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 600000
          }
        );
      });
    }

    async function reverseGeocode(lat, lon) {
      // Open-Meteo reverse geocoding via their search endpoint isn't reverse-capable,
      // so use the free BigDataCloud client-side reverse geocoder (no key).
      try {
        const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
        const d = await r.json();
        return d.city || d.locality || d.principalSubdivision || 'Unknown';
      } catch (e) {
        return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      }
    }

    async function getWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&hourly=temperature_2m,apparent_temperature,weather_code,precipitation_probability,precipitation,wind_speed_10m,uv_index` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max` +
        `&wind_speed_unit=mph&timezone=auto&forecast_days=7`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('Weather service unavailable.');
      return r.json();
    }

    async function getPollen(lat, lon) {
      // Open-Meteo CAMS air-quality endpoint — pollen fields are only populated
      // over Europe, so return null elsewhere and we'll hide the stat.
      try {
        const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}` +
          `&hourly=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen` +
          `&timezone=auto&forecast_days=7`;
        const r = await fetch(url);
        if (!r.ok) return null;
        return r.json();
      } catch {
        return null;
      }
    }

    // Convert raw pollen grains/m³ into a low/medium/high category per day.
    // Thresholds are a pragmatic blend of typical grass/birch high-season ranges.
    function classifyPollen(maxValue) {
      if (maxValue == null || isNaN(maxValue)) return null;
      if (maxValue >= 50) return {
        label: 'High',
        color: '#8A3D35'
      };
      if (maxValue >= 10) return {
        label: 'Medium',
        color: '#C27B1F'
      };
      return {
        label: 'Low',
        color: '#2F5D3E'
      };
    }

    // WHO UV-index bands. Colour follows the standard green/yellow/orange/red/violet scheme.
    function classifyUV(uv) {
      if (uv == null || isNaN(uv)) return null;
      if (uv >= 11) return {
        label: 'Extreme',
        color: '#6B3FA0'
      };
      if (uv >= 8) return {
        label: 'V High',
        color: '#8A3D35'
      };
      if (uv >= 6) return {
        label: 'High',
        color: '#C27B1F'
      };
      if (uv >= 3) return {
        label: 'Moderate',
        color: '#7A5A1F'
      };
      return {
        label: 'Low',
        color: '#2F5D3E'
      };
    }

    // Pick an outfit for the selected day based on apparent temp + rain + uv + snow.
    // Samples the 11am–2pm window so the suggestion reflects the active part of
    // the day rather than whatever hour the user happens to check.
    function chooseOutfit(dayIndex) {
      const h = weatherData.hourly;
      const dayDate = weatherData.daily.time[dayIndex];
      const windowIdxs = h.time
        .map((t, i) => ({
          t,
          i
        }))
        .filter(({
          t
        }) => {
          if (!t.startsWith(dayDate)) return false;
          const hr = new Date(t).getHours();
          return hr >= 11 && hr <= 14;
        })
        .map(({
          i
        }) => i);

      const sampleIdxs = windowIdxs.length ?
        windowIdxs :
        (() => {
          const fallback = h.time.findIndex(t => t.startsWith(dayDate));
          return fallback >= 0 ? [fallback] : [];
        })();
      if (!sampleIdxs.length) return null;

      const apparent = sampleIdxs.map(i => h.apparent_temperature?.[i] ?? h.temperature_2m[i]);
      const temp = Math.round(apparent.reduce((a, b) => a + b, 0) / apparent.length);
      const rain = Math.max(...sampleIdxs.map(i => h.precipitation_probability[i] ?? 0));
      const rainMm = Math.max(...sampleIdxs.map(i => h.precipitation?.[i] ?? 0));
      const wind = Math.max(...sampleIdxs.map(i => h.wind_speed_10m?.[i] ?? 0));
      const uv = Math.max(...sampleIdxs.map(i => h.uv_index?.[i] ?? 0));
      const codeCounts = {};
      sampleIdxs.forEach(i => {
        const c = h.weather_code[i];
        codeCounts[c] = (codeCounts[c] || 0) + 1;
      });
      const code = Number(Object.entries(codeCounts).sort((a, b) => b[1] - a[1])[0][0]);
      const isSnow = [71, 73, 75, 77, 85, 86].includes(code);

      const outfit = {
        headwear: null,
        eyewear: null,
        scarf: false,
        torso: 'longsleeve',
        legs: 'trousers',
        umbrella: false,
        windy: false
      };
      if (temp >= 22) {
        outfit.torso = 'tshirt';
        outfit.legs = 'shorts';
      } else if (temp >= 16) {
        outfit.torso = 'tshirt';
      } else if (temp >= 10) {
        outfit.torso = 'longsleeve';
      } else if (temp >= 2) {
        outfit.torso = 'coat';
      } else {
        outfit.torso = 'coat';
        outfit.scarf = true;
        outfit.headwear = 'beanie';
      }

      // Probability and amount must both clear the bar — high prob of trace
      // drizzle (e.g. 60% / 0.1mm) isn't worth a brolly or raincoat.
      if (rain >= 40 && rainMm >= 0.3) outfit.umbrella = true;
      if (rain >= 70 && rainMm >= 1) outfit.torso = 'raincoat';

      // Stiff breeze argues for a windbreaker; a gale renders an umbrella useless
      // and pushes you into a raincoat if there's any meaningful rain.
      if (wind >= 15 && temp < 18 && outfit.torso === 'longsleeve') outfit.torso = 'coat';
      if (wind >= 25) {
        outfit.windy = true;
        outfit.umbrella = false;
        if (rainMm >= 0.5) outfit.torso = 'raincoat';
      }

      if (uv >= 5 && temp >= 16 && !outfit.umbrella) outfit.eyewear = 'sunglasses';
      if (isSnow) {
        outfit.headwear = 'beanie';
        outfit.scarf = true;
      }

      return {
        outfit,
        temp,
        rain,
        rainMm,
        wind,
        isSnow
      };
    }

    function captionFor({
      outfit,
      temp,
      rain,
      wind,
      isSnow
    }) {
      const mph = Math.round(wind);
      if (isSnow) return `${temp}° and snowy — full winter kit.`;
      if (outfit.torso === 'raincoat' && outfit.windy) return `${temp}° with rain and ${mph}mph wind — waterproofs, brolly is useless.`;
      if (outfit.torso === 'raincoat') return `${temp}° with ${rain}% rain — full waterproofs.`;
      if (outfit.umbrella && outfit.torso === 'coat') return `${temp}° and soggy — coat and brolly.`;
      if (outfit.umbrella) return `${temp}° with ${rain}% rain — pack a brolly.`;
      if (outfit.windy) return `${temp}° and blowy (${mph}mph) — windproof layer.`;
      if (outfit.scarf) return `${temp}° — properly cold, wrap up.`;
      if (outfit.torso === 'coat') return `${temp}° — coat required.`;
      if (outfit.legs === 'shorts') return `${temp}° — shorts and t-shirt, enjoy.`;
      if (outfit.torso === 'tshirt') return `${temp}° — t-shirt weather, trousers still.`;
      return `${temp}° — light layers do the job.`;
    }

    function renderFigure(outfit) {
      const skin = '#F5C998';
      const isShorts = outfit.legs === 'shorts';
      const hasSleeves = outfit.torso !== 'tshirt';
      const isCoat = outfit.torso === 'coat' || outfit.torso === 'raincoat';
      const torsoColor = outfit.torso === 'raincoat' ? '#E5B94F' :
        outfit.torso === 'tshirt' ? 'var(--teal)' :
        'var(--indigo)';
      const parts = [];

      parts.push(`<ellipse cx="50" cy="128" rx="20" ry="2.5" fill="rgba(0,0,0,0.12)"/>`);

      const legColor = isShorts ? skin : 'var(--indigo)';
      parts.push(`<rect x="40" y="90" width="8" height="36" rx="3" fill="${legColor}"/>`);
      parts.push(`<rect x="52" y="90" width="8" height="36" rx="3" fill="${legColor}"/>`);
      if (isShorts) parts.push(`<rect x="36" y="86" width="28" height="14" rx="4" fill="var(--teal)"/>`);
      parts.push(`<ellipse cx="44" cy="126" rx="5.5" ry="3" fill="var(--indigo)"/>`);
      parts.push(`<ellipse cx="56" cy="126" rx="5.5" ry="3" fill="var(--indigo)"/>`);

      const armColor = hasSleeves ? torsoColor : skin;
      const armX = isCoat ? 20 : 22;
      const armW = isCoat ? 10 : 9;
      parts.push(`<rect x="${armX}" y="46" width="${armW}" height="36" rx="4" fill="${armColor}"/>`);
      parts.push(`<rect x="${100 - armX - armW}" y="46" width="${armW}" height="36" rx="4" fill="${armColor}"/>`);

      const torsoW = isCoat ? 36 : 30;
      const torsoX = (100 - torsoW) / 2;
      parts.push(`<rect x="${torsoX}" y="42" width="${torsoW}" height="52" rx="6" fill="${torsoColor}"/>`);
      if (isCoat) parts.push(`<line x1="50" y1="45" x2="50" y2="90" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>`);

      parts.push(`<circle cx="${armX + armW / 2}" cy="83" r="3.5" fill="${skin}"/>`);
      parts.push(`<circle cx="${100 - armX - armW / 2}" cy="83" r="3.5" fill="${skin}"/>`);

      parts.push(`<rect x="47" y="38" width="6" height="6" fill="${skin}"/>`);
      parts.push(`<circle cx="50" cy="26" r="14" fill="${skin}"/>`);
      parts.push(`<path d="M 37 19 Q 50 8 63 19 Q 60 12 50 11 Q 40 12 37 19 Z" fill="var(--indigo)"/>`);

      if (outfit.eyewear === 'sunglasses') {
        parts.push(`<rect x="39" y="23" width="22" height="5" rx="2" fill="#1a1a1a"/>`);
      } else {
        parts.push(`<circle cx="45" cy="26" r="1.3" fill="var(--indigo)"/>`);
        parts.push(`<circle cx="55" cy="26" r="1.3" fill="var(--indigo)"/>`);
      }
      parts.push(`<path d="M 46 31 Q 50 33 54 31" stroke="var(--indigo)" stroke-width="1.2" fill="none" stroke-linecap="round"/>`);

      if (outfit.scarf) {
        parts.push(`<path d="M 36 38 Q 50 44 64 38 L 64 45 Q 50 50 36 45 Z" fill="var(--plum)"/>`);
        parts.push(`<path d="M 58 44 L 62 56 L 56 54 Z" fill="var(--plum)"/>`);
      }

      if (outfit.headwear === 'beanie') {
        parts.push(`<path d="M 35 17 Q 50 2 65 17 L 65 14 Q 60 5 50 5 Q 40 5 35 14 Z" fill="var(--plum)"/>`);
        parts.push(`<rect x="35" y="16" width="30" height="4" fill="var(--plum)"/>`);
        parts.push(`<circle cx="50" cy="3" r="3" fill="var(--cream)"/>`);
      }

      if (outfit.umbrella) {
        parts.push(`<path d="M 14 10 Q 50 -12 86 10 Q 75 5 65 9 Q 57 3 50 8 Q 43 3 35 9 Q 25 5 14 10 Z" fill="var(--teal)" stroke="var(--indigo)" stroke-width="0.7"/>`);
        parts.push(`<line x1="50" y1="8" x2="50" y2="37" stroke="var(--indigo)" stroke-width="1.5"/>`);
        parts.push(`<path d="M 50 37 Q 54 39 54 43" fill="none" stroke="var(--indigo)" stroke-width="1.5" stroke-linecap="round"/>`);
      }

      return `<svg viewBox="-5 -15 110 150" xmlns="http://www.w3.org/2000/svg">${parts.join('')}</svg>`;
    }

    // Descriptive band for wind speed in mph — roughly aligned to the Beaufort scale.
    function classifyWind(mph) {
      if (mph == null || isNaN(mph)) return '';
      if (mph < 3) return 'None';
      if (mph < 5) return 'Low';
      if (mph < 15) return 'Medium';
      if (mph < 25) return 'High';
      return 'V High';
    }

    // Rough WMO severity ordering — higher = more disruptive / worth flagging
    // even when it isn't the most common code of the day.
    function codeSeverity(code) {
      if (code >= 95) return 9; // thunderstorm
      if (code >= 80) return 8; // showers
      if (code >= 71) return 7; // snow
      if (code >= 61) return 6; // rain
      if (code >= 51) return 5; // drizzle
      if (code >= 45) return 4; // fog
      return code; // 0 clear → 3 overcast
    }

    // Summarise a day's weather between sunrise and sunset. If two or more hours
    // of fog/precip/storm appear, promote the most severe of those over a sunnier
    // mode — otherwise a brief afternoon storm gets hidden by a sunny morning.
    function daytimeWeatherCode(hourly, dayDateStr, sunriseISO, sunsetISO) {
      const startHr = sunriseISO ? new Date(sunriseISO).getHours() : 7;
      const endHr = sunsetISO ? new Date(sunsetISO).getHours() : 16;
      const counts = {};
      hourly.time.forEach((t, i) => {
        if (!t.startsWith(dayDateStr)) return;
        const hr = new Date(t).getHours();
        if (hr < startHr || hr > endHr) return;
        const code = hourly.weather_code[i];
        counts[code] = (counts[code] || 0) + 1;
      });
      const entries = Object.entries(counts).map(([c, n]) => ({
        code: Number(c),
        count: n
      }));
      if (!entries.length) return null;

      const meaningful = entries
        .filter(e => e.code >= 45 && e.count >= 2)
        .sort((a, b) => codeSeverity(b.code) - codeSeverity(a.code) || b.count - a.count);
      if (meaningful.length) return meaningful[0].code;

      return entries.sort((a, b) => b.count - a.count)[0].code;
    }

    function dailyMaxPollen(pollen, dayDateStr) {
      if (!pollen || !pollen.hourly) return null;
      const fields = ['alder_pollen', 'birch_pollen', 'grass_pollen', 'mugwort_pollen', 'olive_pollen', 'ragweed_pollen'];
      let max = null;
      pollen.hourly.time.forEach((t, i) => {
        if (!t.startsWith(dayDateStr)) return;
        for (const f of fields) {
          const v = pollen.hourly[f]?.[i];
          if (typeof v === 'number' && !isNaN(v)) {
            if (max === null || v > max) max = v;
          }
        }
      });
      return max;
    }

    // State for the app — kept at module scope so click handlers can read it.
    let weatherData = null;
    let pollenData = null;
    let selectedDayIndex = 0;

    function formatHour(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString(undefined, {
        hour: 'numeric',
        hour12: true
      }).toLowerCase().replace(' ', '');
    }

    function formatTime(isoString) {
      return new Date(isoString).toLocaleTimeString(undefined, {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderDetailPanel(dayIndex, scrollEdge) {
      const d = weatherData.daily;
      const h = weatherData.hourly;
      const dayDate = d.time[dayIndex];
      const [desc] = describe(d.weather_code[dayIndex]);

      // Find hourly entries that fall on this day (YYYY-MM-DD prefix match).
      const hoursForDay = h.time
        .map((t, i) => ({
          t,
          i
        }))
        .filter(({
          t
        }) => t.startsWith(dayDate));

      // For today, start from the current hour (in the location's timezone);
      // for other days, show all 24.
      const currentHour = Number(new Date().toLocaleString('en-GB', {
        timeZone: weatherData.timezone,
        hour: '2-digit',
        hour12: false
      }));
      // Always show all 24 hours — the scroll position defaults to 7am below,
      // but users can scroll back to see earlier times.
      const hoursHTML = hoursForDay.map(({
        t,
        i
      }) => {
        const [, icon] = describe(h.weather_code[i]);
        const isNow = dayIndex === 0 && new Date(t).getHours() === currentHour;
        const precip = h.precipitation_probability[i] ?? 0;
        const wind = h.wind_speed_10m[i];
        const temp = Math.round(h.temperature_2m[i]);
        const feels = h.apparent_temperature ? Math.round(h.apparent_temperature[i]) : null;
        const feelsHTML = feels != null && Math.abs(feels - temp) >= 1 ?
          `<div class="hour-feels">feels ${feels}°</div>` :
          `<div class="hour-feels"></div>`;
        return `
        <div class="hour-card ${isNow ? 'now' : ''}" data-hour="${new Date(t).getHours()}">
          <div class="hour-time">${isNow ? 'Now' : formatHour(t)}</div>
          <div class="hour-icon">${icon}</div>
          <div class="hour-temp">${temp}°</div>
          ${feelsHTML}
          <div class="hour-metric hour-precip">${DROP_ICON}<span>${precip}%</span></div>
          <div class="hour-metric hour-wind">${WIND_ICON}<span>${classifyWind(wind)}</span></div>
        </div>
      `;
      }).join('');

      const hasPrev = dayIndex > 0;
      const hasNext = dayIndex < d.time.length - 1;
      const placeholderBar = '<div class="precip-bar placeholder"></div>';
      const precipBarsHTML =
        (hasPrev ? placeholderBar : '') +
        hoursForDay.map(({
          i
        }) => {
          const p = h.precipitation_probability[i] ?? 0;
          return `<div class="precip-bar" style="--p:${p}%" title="${p}% chance of rain"></div>`;
        }).join('') +
        (hasNext ? placeholderBar : '');

      const prevJumpHTML = hasPrev ? `
        <button type="button" class="hour-card day-jump" data-jump="${dayIndex - 1}" data-jump-edge="end" aria-label="View ${dayName(d.time[dayIndex - 1], dayIndex - 1)}">
          <div class="day-jump-arrow">←</div>
          <div class="day-jump-label">${dayName(d.time[dayIndex - 1], dayIndex - 1)}</div>
        </button>
      ` : '';
      const nextJumpHTML = hasNext ? `
        <button type="button" class="hour-card day-jump" data-jump="${dayIndex + 1}" data-jump-edge="start" aria-label="View ${dayName(d.time[dayIndex + 1], dayIndex + 1)}">
          <div class="day-jump-arrow">→</div>
          <div class="day-jump-label">${dayName(d.time[dayIndex + 1], dayIndex + 1)}</div>
        </button>
      ` : '';

      const title = dayIndex === 0 ?
        'Today · Hourly' :
        `${new Date(dayDate).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' })} · Hourly`;

      // Build advisor cards: washing-line, frost warning, UV warning.
      // Washing shows for any location. Frost/UV are gated to "here" since
      // they're personal (your plants, your skin) rather than travel-planning.
      let advisorsHTML = '';

      // Washing-line: daylight hours, since stuff dries by sun + warmth.
      // For today, start from whichever is later of "now" or sunrise.
      const sunriseHr = new Date(d.sunrise[dayIndex]).getHours();
      const sunsetHr = new Date(d.sunset[dayIndex]).getHours();
      const washingStart = dayIndex === 0 ? Math.max(sunriseHr, currentHour) : sunriseHr;
      const washingEnd = sunsetHr;
      const washingHours = hoursForDay.filter(({
        t
      }) => {
        const hr = new Date(t).getHours();
        return hr >= washingStart && hr <= washingEnd;
      });
      if (washingHours.length > 0) {
        const maxProb = Math.max(...washingHours.map(({
          i
        }) => h.precipitation_probability[i] ?? 0));
        // Bar must be cleared on both axes — a 35% chance of zero-mm fizzle
        // shouldn't block hanging out, only a real risk of measurable rain.
        const canHang = washingHours.every(({
          i
        }) => {
          const p = h.precipitation_probability[i] ?? 0;
          const mm = h.precipitation?.[i] ?? 0;
          return !(p >= 30 && mm >= 0.2);
        });
        const fmtHour12 = hr => {
          const period = hr >= 12 ? 'pm' : 'am';
          const h12 = hr % 12 === 0 ? 12 : hr % 12;
          return `${h12}${period}`;
        };
        const windowLabel = `${fmtHour12(washingStart)}–${fmtHour12(washingEnd)}`;
        advisorsHTML += `
        <div class="advisor ${canHang ? 'yes' : 'no'}">
          <div class="advisor-icon">${canHang
            ? `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
            : `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`}</div>
          <div>
            <div class="advisor-title">Hang washing outside? ${canHang ? 'Yes' : 'No'}</div>
            <div class="advisor-reason">${canHang
              ? `Rain chance stays under 30% (peak ${maxProb}% between ${windowLabel}).`
              : `Peak rain chance is ${maxProb}% between ${windowLabel} — needs to stay under 30%.`}</div>
          </div>
        </div>
      `;
      }

      if (!isSearchedLocation) {
        // Frost warning: for today, look at the remaining hours plus the
        // overnight into tomorrow (until 8am) since frost forms after dark.
        // For other days, look at that day's full hourly range.
        let frostHours;
        if (dayIndex === 0) {
          const todayDate = d.time[0];
          const tomorrowDate = d.time[1];
          frostHours = h.time
            .map((t, i) => ({
              t,
              i
            }))
            .filter(({
              t
            }) => {
              const hr = new Date(t).getHours();
              if (t.startsWith(todayDate) && hr >= currentHour) return true;
              if (tomorrowDate && t.startsWith(tomorrowDate) && hr <= 8) return true;
              return false;
            });
        } else {
          frostHours = hoursForDay;
        }
        if (frostHours.length > 0) {
          const temps = frostHours.map(({
            i
          }) => h.temperature_2m[i]);
          const minTemp = Math.min(...temps);
          if (minTemp < 2) {
            const minIdx = frostHours[temps.indexOf(minTemp)].i;
            const minTime = h.time[minIdx];
            const minHr = new Date(minTime).getHours();
            const minWhen = formatHour(minTime);
            const rounded = Math.round(minTemp);

            // Whether the cold dip falls tonight or in tomorrow's pre-dawn hours
            // changes both the headline ("tonight" vs "tomorrow morning") and the
            // time label, since "5am" alone doesn't say which day.
            let frostLabel = '';
            let timeLabel = minWhen;
            if (dayIndex === 0) {
              const tomorrowDate = d.time[1];
              const isTomorrow = tomorrowDate && minTime.startsWith(tomorrowDate);
              if (isTomorrow) {
                frostLabel = minHr < 12 ? 'tomorrow morning' : 'tomorrow';
                timeLabel = `${minWhen} tomorrow`;
              } else {
                frostLabel = 'tonight';
              }
            }

            advisorsHTML += `
            <div class="advisor frost">
              <div class="advisor-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="2" x2="12" y2="22"/>
                  <line x1="2" y1="12" x2="22" y2="12"/>
                  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                  <line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/>
                  <polyline points="8 5 12 9 16 5"/>
                  <polyline points="8 19 12 15 16 19"/>
                  <polyline points="5 8 9 12 5 16"/>
                  <polyline points="19 8 15 12 19 16"/>
                </svg>
              </div>
              <div>
                <div class="advisor-title">Frost likely ${frostLabel}</div>
                <div class="advisor-reason">Drops to ${rounded}°C around ${timeLabel} — cover tender plants, expect icy windscreens.</div>
              </div>
            </div>
          `;
          }
        }

        // UV warning: look at remaining daylight hours on the selected day.
        // Only warn if max UV during that window is 6+ (High or above).
        if (h.uv_index) {
          const uvHours = hoursForDay.filter(({
            t
          }) => {
            const hr = new Date(t).getHours();
            return dayIndex === 0 ? hr >= currentHour && hr <= 20 : hr >= 6 && hr <= 20;
          });
          if (uvHours.length > 0) {
            const uvValues = uvHours.map(({
              i
            }) => h.uv_index[i] ?? 0);
            const maxUV = Math.max(...uvValues);
            if (maxUV >= 6) {
              const peakIdx = uvHours[uvValues.indexOf(maxUV)].i;
              const peakWhen = formatHour(h.time[peakIdx]);
              const band = classifyUV(maxUV);
              advisorsHTML += `
              <div class="advisor uv">
                <div class="advisor-icon">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/>
                    <line x1="12" y1="2" x2="12" y2="4"/>
                    <line x1="12" y1="20" x2="12" y2="22"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="2" y1="12" x2="4" y2="12"/>
                    <line x1="20" y1="12" x2="22" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                  </svg>
                </div>
                <div>
                  <div class="advisor-title">Sunscreen recommended</div>
                  <div class="advisor-reason">UV peaks at ${Math.round(maxUV)} (${band.label}) around ${peakWhen} — unprotected skin burns quickly.</div>
                </div>
              </div>
            `;
            }
          }
        }
      }

      const pollenMax = dailyMaxPollen(pollenData, dayDate);
      const pollen = classifyPollen(pollenMax);
      const pollenStat = pollen ?
        `<div class="stat">
           <span class="stat-label">Pollen</span>
           <span class="stat-value" style="color:${pollen.color}">${pollen.label}</span>
         </div>` :
        '';

      const dressMe = chooseOutfit(dayIndex);
      const dressMeTitle = dayIndex === 0 ?
        'Dress for today' :
        `Dress for ${new Date(dayDate).toLocaleDateString(undefined, { weekday: 'long' })}`;
      const dressMeHTML = dressMe ? `
        <div class="dress-me">
          <div class="dress-me-figure">${renderFigure(dressMe.outfit)}</div>
          <div>
            <div class="dress-me-title">${dressMeTitle}</div>
            <div class="dress-me-caption">${captionFor(dressMe)}</div>
          </div>
        </div>
      ` : '';

      document.getElementById('detail-panel').innerHTML = `
      ${advisorsHTML}
      <div class="detail-panel-header">
        <div>
          <div class="detail-panel-title">${title}</div>
          <div style="color:var(--plum); font-size:0.9rem; margin-top:0.25rem;">${desc}</div>
        </div>
        <div class="detail-panel-stats">
          <div class="stat">
            <span class="stat-label">High / Low</span>
            <span class="stat-value">${Math.round(d.temperature_2m_max[dayIndex])}° / ${Math.round(d.temperature_2m_min[dayIndex])}°</span>
          </div>
          ${pollenStat}
          <div class="stat">
            <span class="stat-label">Sunrise</span>
            <span class="stat-value">${formatTime(d.sunrise[dayIndex])}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Sunset</span>
            <span class="stat-value">${formatTime(d.sunset[dayIndex])}</span>
          </div>
        </div>
      </div>
      <div class="hourly-scroll">
        <div class="precip-bars">${precipBarsHTML}</div>
        <div class="hourly-row">${prevJumpHTML}${hoursHTML}${nextJumpHTML}</div>
      </div>
      ${dressMeHTML}
    `;

      // Hook up the prev/next-day jump cards at each end of the hourly strip.
      document.querySelectorAll('#detail-panel .day-jump').forEach(btn => {
        btn.addEventListener('click', () => {
          selectDay(Number(btn.dataset.jump), btn.dataset.jumpEdge);
        });
      });

      // Default scroll position: "Now" for today, 7am for other days. When the
      // user arrives via a jump card we land at the matching edge instead so it
      // feels like the strip just continues into the next/previous day.
      const scroller = document.querySelector('#detail-panel .hourly-scroll');
      const row = scroller && scroller.querySelector('.hourly-row');
      if (scroller && row) {
        if (scrollEdge === 'start') {
          scroller.scrollLeft = 0;
        } else if (scrollEdge === 'end') {
          scroller.scrollLeft = scroller.scrollWidth;
        } else {
          const scrollToHour = dayIndex === 0 ? currentHour : 7;
          const target = scroller.querySelector(`.hour-card[data-hour="${scrollToHour}"]`);
          if (target) {
            scroller.scrollLeft = target.offsetLeft - row.offsetLeft;
          }
        }
      }
    }

    function buildDaySummary(dayIndex) {
      const d = weatherData.daily;
      const h = weatherData.hourly;
      const dayDate = d.time[dayIndex];
      const dayLabel = dayIndex === 0
        ? 'today'
        : new Date(dayDate).toLocaleDateString(undefined, { weekday: 'long' });

      const hourIdxs = h.time
        .map((t, i) => t.startsWith(dayDate) ? i : -1)
        .filter(i => i >= 0);

      const temps = hourIdxs.map(i => h.temperature_2m[i]);
      const feels = hourIdxs.map(i => h.apparent_temperature?.[i] ?? h.temperature_2m[i]);
      const probs = hourIdxs.map(i => h.precipitation_probability[i] ?? 0);
      const mm = hourIdxs.map(i => h.precipitation?.[i] ?? 0);
      const winds = hourIdxs.map(i => h.wind_speed_10m?.[i] ?? 0);
      const uvs = hourIdxs.map(i => h.uv_index?.[i] ?? 0);
      const codes = hourIdxs.map(i => h.weather_code[i]);

      const hi = Math.round(Math.max(...temps));
      const lo = Math.round(Math.min(...temps));
      const feelsHi = Math.round(Math.max(...feels));
      const maxProb = Math.max(...probs);
      const totalMm = mm.reduce((a, b) => a + b, 0);
      const maxWind = Math.round(Math.max(...winds));
      const peakUV = Math.max(...uvs);

      const isSun = c => c <= 1;
      const isPartly = c => c === 2;
      const isCloudy = c => c === 3 || c === 45 || c === 48;
      const isRain = c => (c >= 51 && c <= 67) || (c >= 80 && c <= 82);
      const isSnow = c => (c >= 71 && c <= 77) || (c >= 85 && c <= 86);
      const isStorm = c => c >= 95;

      const sunCount = codes.filter(isSun).length;
      const rainCount = codes.filter(isRain).length;
      const snowCount = codes.filter(isSnow).length;
      const stormCount = codes.filter(isStorm).length;
      const cloudyCount = codes.filter(c => isCloudy(c) || isPartly(c)).length;

      const wettestIdx = mm.indexOf(Math.max(...mm));
      const wettestHr = wettestIdx >= 0
        ? new Date(h.time[hourIdxs[wettestIdx]]).getHours()
        : null;
      const uvPeakIdx = uvs.indexOf(peakUV);
      const uvPeakHr = uvPeakIdx >= 0
        ? new Date(h.time[hourIdxs[uvPeakIdx]]).getHours()
        : null;

      const fmtHr = hr => {
        if (hr == null) return '';
        const period = hr >= 12 ? 'pm' : 'am';
        const h12 = hr % 12 === 0 ? 12 : hr % 12;
        return `${h12}${period}`;
      };

      const pick = arr => arr[Math.floor(Math.random() * arr.length)];

      let vibe;
      if (stormCount > 0) vibe = 'storm';
      else if (snowCount >= 2) vibe = 'snow';
      else if (rainCount >= Math.max(4, codes.length * 0.5)) vibe = 'wet';
      else if (rainCount > 0) vibe = 'mixed-wet';
      else if (sunCount >= codes.length * 0.6) vibe = hi >= 22 ? 'glorious' : hi <= 4 ? 'crisp' : 'sunny';
      else if (cloudyCount >= codes.length * 0.6) vibe = 'grey';
      else vibe = 'mixed';

      const openers = {
        glorious: [
          `${cap(dayLabel)} is a proper treat`,
          `${cap(dayLabel)}'s a beauty`,
          `${cap(dayLabel)}'s the sort of day you want to bottle`
        ],
        sunny: [
          `${cap(dayLabel)}'s looking bright and friendly`,
          `Plenty of sunshine on the menu for ${dayLabel}`,
          `${cap(dayLabel)}'s shaping up nicely — sun's the headline act`
        ],
        crisp: [
          `${cap(dayLabel)}'s one of those crisp, clear ones`,
          `Bright but brisk for ${dayLabel}`,
          `${cap(dayLabel)} is chilly-but-cheerful — clear skies, cold air`
        ],
        mixed: [
          `${cap(dayLabel)}'s a bit of a mixed bag`,
          `A classic "all-sorts" kind of day for ${dayLabel}`,
          `${cap(dayLabel)} can't quite make up its mind`
        ],
        grey: [
          `${cap(dayLabel)}'s leaning grey`,
          `${cap(dayLabel)} is a cloudy affair`,
          `A muted, overcast feel to ${dayLabel}`
        ],
        'mixed-wet': [
          `${cap(dayLabel)}'s a bit damp in patches`,
          `Showers drop in and out on ${dayLabel}`,
          `${cap(dayLabel)} comes with some wet spells`
        ],
        wet: [
          `${cap(dayLabel)}'s a soggy one`,
          `Rain settles in for ${dayLabel}`,
          `${cap(dayLabel)}'s the kind of day that keeps the brolly busy`
        ],
        snow: [
          `${cap(dayLabel)}'s turning winter on you — snow in the mix`,
          `Snow makes an appearance on ${dayLabel}`,
          `${cap(dayLabel)}'s doing its best snowglobe impression`
        ],
        storm: [
          `${cap(dayLabel)}'s got drama — thunderstorms on the bill`,
          `Thundery weather rolls through on ${dayLabel}`,
          `${cap(dayLabel)} brings a rumble or two`
        ]
      };

      const tempDescriptors = hi >= 27 ? 'toasty'
        : hi >= 22 ? 'warm'
        : hi >= 16 ? 'mild'
        : hi >= 10 ? 'cool'
        : hi >= 4 ? 'chilly'
        : 'properly cold';

      const tempPhrase = (() => {
        const gap = hi - lo;
        const feelsGap = Math.abs(feelsHi - hi) >= 3
          ? ` (feels more like ${feelsHi}° when you're out in it)`
          : '';
        if (gap >= 10) {
          return `Highs of ${hi}°C${feelsGap}, dipping to a much cooler ${lo}°C — worth layering up.`;
        }
        return `Highs around ${hi}°C${feelsGap} and lows of ${lo}°C — ${tempDescriptors} overall.`;
      })();

      const tips = [];
      if (vibe === 'wet' || totalMm >= 3) {
        tips.push(pick([
          `You'll want waterproofs — around ${totalMm.toFixed(1)}mm of rain on the ledger, peaking near ${fmtHr(wettestHr)}.`,
          `Keep the umbrella handy; the wettest patch hits around ${fmtHr(wettestHr)} with about ${totalMm.toFixed(1)}mm total.`,
          `Plan indoor backups — rain totals reach roughly ${totalMm.toFixed(1)}mm, heaviest near ${fmtHr(wettestHr)}.`
        ]));
      } else if (vibe === 'mixed-wet' || (maxProb >= 40 && totalMm >= 0.5)) {
        tips.push(pick([
          `Pack an umbrella just in case — rain chance peaks at ${maxProb}%.`,
          `There's a ${maxProb}% chance of showers sneaking in, so a light waterproof's worth tossing in the bag.`,
          `Showers are on the table (peak ${maxProb}%), so don't be caught out.`
        ]));
      }
      if (peakUV >= 6 && vibe !== 'storm' && vibe !== 'wet') {
        tips.push(pick([
          `Sun's got a bite — UV peaks at ${Math.round(peakUV)} around ${fmtHr(uvPeakHr)}, so sunscreen if you'll be out.`,
          `Slap on some SPF before heading out; UV hits ${Math.round(peakUV)} near ${fmtHr(uvPeakHr)}.`,
          `Unprotected skin burns quick today — UV tops ${Math.round(peakUV)} around ${fmtHr(uvPeakHr)}.`
        ]));
      }
      if (maxWind >= 40) {
        tips.push(pick([
          `Breezy too — gusts reach ${maxWind} km/h, so anything light will fly.`,
          `The wind's putting in a shift, topping ${maxWind} km/h — hold onto your hat.`,
          `Expect proper gusts up to ${maxWind} km/h.`
        ]));
      }
      if (lo <= 1 && vibe !== 'snow' && vibe !== 'storm') {
        tips.push(pick([
          `Cold enough for frost overnight — cover tender plants and expect icy screens in the morning.`,
          `Frost's on the cards with lows of ${lo}°C — wrap up warm.`
        ]));
      }

      const signoffs = {
        glorious: ['Enjoy every minute.', 'Get out there.', 'Treasure this one.'],
        sunny: ['Make the most of it.', 'Lovely day to be outside.', 'Soak it up.'],
        crisp: ['Wrap up and enjoy the clarity.', 'Scarf weather — but pretty.', 'Cold hands, happy heart.'],
        mixed: ['Be ready for anything.', 'Dress in layers and roll with it.', 'A bring-a-jacket kind of day.'],
        grey: ['Cosy vibes all round.', 'Good day for a hot drink.', 'Nothing wrong with a muted one.'],
        'mixed-wet': ['Pack smart, go anyway.', 'Keep a light waterproof on hand.', 'Plans with a plan B.'],
        wet: ['Perfect excuse to stay in.', 'Cosy indoor day awaits.', 'Tea, blanket, sorted.'],
        snow: ['Dress properly and enjoy the novelty.', 'Snow boots time.', 'Careful on the roads.'],
        storm: ['Keep an eye on the sky.', 'Indoor plans win today.', 'Batten down and stay safe.']
      };

      const opener = pick(openers[vibe]);
      const signoff = pick(signoffs[vibe]);

      const para1 = `${opener}. ${tempPhrase}`;
      const para2 = tips.length
        ? `${tips.join(' ')} ${signoff}`
        : `Not a lot to worry about weather-wise — an easy-going day. ${signoff}`;

      return [para1, para2];

      function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    }

    let summaryReturnFocus = null;

    function openSummaryModal(dayIndex, triggerEl) {
      closeSummaryModal();
      summaryReturnFocus = triggerEl || null;

      const dayDate = weatherData.daily.time[dayIndex];
      const titleLabel = dayIndex === 0
        ? 'Today'
        : new Date(dayDate).toLocaleDateString(undefined, {
            weekday: 'long',
            month: 'long',
            day: 'numeric'
          });

      const paragraphs = buildDaySummary(dayIndex);

      const backdrop = document.createElement('div');
      backdrop.className = 'summary-backdrop';
      backdrop.setAttribute('role', 'dialog');
      backdrop.setAttribute('aria-modal', 'true');
      backdrop.setAttribute('aria-label', `${titleLabel} summary`);
      backdrop.innerHTML = `
        <div class="summary-modal" role="document">
          <div class="summary-modal-header">
            <div class="summary-modal-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 3l1.8 4.6L18 9l-4.2 2.4L12 16l-1.8-4.6L6 9l4.2-1.4z"/>
                <path d="M19 15l.8 1.8L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-1.2z"/>
              </svg>
              <span>${titleLabel}</span>
            </div>
            <button type="button" class="summary-modal-close" aria-label="Close summary">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="summary-modal-body">
            ${paragraphs.map(p => `<p>${p}</p>`).join('')}
          </div>
        </div>
      `;

      backdrop.addEventListener('click', e => {
        if (e.target === backdrop) closeSummaryModal();
      });
      backdrop.querySelector('.summary-modal-close')
        .addEventListener('click', closeSummaryModal);

      document.body.appendChild(backdrop);
      document.body.style.overflow = 'hidden';
      document.addEventListener('keydown', summaryKeyHandler);

      requestAnimationFrame(() => {
        backdrop.querySelector('.summary-modal-close').focus();
      });
    }

    function closeSummaryModal() {
      const existing = document.querySelector('.summary-backdrop');
      if (!existing) return;
      existing.remove();
      document.body.style.overflow = '';
      document.removeEventListener('keydown', summaryKeyHandler);
      if (summaryReturnFocus && document.contains(summaryReturnFocus)) {
        summaryReturnFocus.focus();
      }
      summaryReturnFocus = null;
    }

    function summaryKeyHandler(e) {
      if (e.key === 'Escape') closeSummaryModal();
    }

    function selectDay(index, scrollEdge) {
      selectedDayIndex = index;
      document.querySelectorAll('.day-card').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
      });
      renderDetailPanel(index, scrollEdge);
    }

    function render(data, locationName) {
      weatherData = data;
      document.getElementById('location').textContent = locationName.split(',')[0].trim();
      startClock(data.timezone);

      const d = data.daily;
      const daysHTML = d.time.map((date, i) => {
        const summaryCode = daytimeWeatherCode(data.hourly, date, d.sunrise[i], d.sunset[i]) ?? d.weather_code[i];
        const [desc, icon] = describe(summaryCode);
        const weekday = new Date(date).getDay();
        const isWeekend = weekday === 0 || weekday === 6;
        return `
        <div class="day-card ${isWeekend ? 'weekend' : ''}" data-day="${i}" style="--stagger:${i}" role="button" tabindex="0" aria-label="View details for ${dayName(date, i)}">
          <div class="day-name">${dayName(date, i)}</div>
          <div class="day-date">${shortDate(date)}</div>
          <div class="day-icon">${icon}</div>
          <div class="day-temps">
            <span class="temp-max">${Math.round(d.temperature_2m_max[i])}°</span>
            <span class="temp-min">${Math.round(d.temperature_2m_min[i])}°</span>
          </div>
          <div class="day-desc">${desc}</div>
          <button type="button" class="day-summary-btn" data-summary="${i}" aria-label="Show summary for ${dayName(date, i)}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3l1.8 4.6L18 9l-4.2 2.4L12 16l-1.8-4.6L6 9l4.2-1.4z"/>
            </svg>
            Summary
          </button>
        </div>
      `;
      }).join('');

      document.getElementById('content').innerHTML =
        `<div class="forecast">${daysHTML}</div>` +
        `<div id="detail-panel" class="detail-panel"></div>`;

      document.querySelectorAll('.day-card').forEach(card => {
        const idx = Number(card.dataset.day);
        card.addEventListener('click', () => selectDay(idx));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectDay(idx);
          }
        });
      });

      document.querySelectorAll('.day-summary-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = Number(btn.dataset.summary);
          openSummaryModal(idx, btn);
        });
        btn.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.stopPropagation();
          }
        });
      });

      selectDay(0);
    }

    function showError(msg, kind) {
      document.getElementById('location').textContent = 'Weather';
      document.getElementById('subtitle').textContent = '';
      const isLocation = kind === 'location';
      document.getElementById('content').innerHTML = `
      <div class="error">
        <div>${msg}</div>
        <div class="error-actions">
          ${isLocation
            ? `<button type="button" id="err-search">Search for a location</button>
               <button type="button" id="err-retry">Try location again</button>`
            : `<button type="button" id="err-retry">Try again</button>`}
        </div>
      </div>
    `;
      if (isLocation) {
        document.getElementById('err-search').addEventListener('click', () => {
          document.getElementById('content').innerHTML =
            '<div class="status">Pick a city from the search box in the top right.</div>';
          toggleSearch(true);
        });
        document.getElementById('err-retry').addEventListener('click', init);
      } else {
        document.getElementById('err-retry').addEventListener('click', () => location.reload());
      }
    }

    let originalLocation = null;
    let clockInterval = null;
    // Tracks whether we're currently showing a city picked from the search
    // box, so the washing-line box can be hidden (only meaningful for "here").
    let isSearchedLocation = false;

    function updateSubtitle(timezone) {
      const now = new Date();
      const opts = timezone ? {
        timeZone: timezone
      } : {};
      const dateStr = now.toLocaleDateString(undefined, {
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        ...opts
      });
      const timeStr = now.toLocaleTimeString(undefined, {
        hour: '2-digit',
        minute: '2-digit',
        ...opts
      });
      document.getElementById('subtitle').textContent = `${dateStr} · ${timeStr}`;
    }

    function startClock(timezone) {
      if (clockInterval) clearInterval(clockInterval);
      updateSubtitle(timezone);
      clockInterval = setInterval(() => updateSubtitle(timezone), 30000);
    }

    async function loadLocation(lat, lon, place) {
      document.getElementById('content').innerHTML =
        '<div class="status">Loading weather…</div>';
      const [weather, pollen] = await Promise.all([
        getWeather(lat, lon),
        getPollen(lat, lon)
      ]);
      pollenData = pollen;
      render(weather, place);
    }

    async function goToOriginalLocation() {
      if (!originalLocation) return;
      const btn = document.getElementById('btn-current');
      btn.disabled = true;
      try {
        isSearchedLocation = false;
        await loadLocation(originalLocation.lat, originalLocation.lon, originalLocation.place);
        btn.hidden = true;
      } catch (e) {
        showError(e.message);
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('btn-current').addEventListener('click', goToOriginalLocation);

    // ---------- City search (Open-Meteo geocoding, no key) ----------
    const btnSearch = document.getElementById('btn-search');
    const searchPanel = document.getElementById('search-panel');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    let searchTimer = null;
    let searchRequestId = 0;

    function toggleSearch(force) {
      const shouldShow = force !== undefined ? force : searchPanel.hidden;
      searchPanel.hidden = !shouldShow;
      if (shouldShow) {
        searchInput.value = '';
        searchResults.innerHTML = '';
        searchInput.focus();
      }
    }

    async function runSearch(name) {
      const myId = ++searchRequestId;
      searchResults.innerHTML = '<div class="search-status">Searching…</div>';
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=6&language=en&format=json`;
        const r = await fetch(url);
        if (myId !== searchRequestId) return; // a newer query has fired
        const data = await r.json();
        const results = (data.results || []);
        if (!results.length) {
          searchResults.innerHTML = '<div class="search-status">No matches</div>';
          return;
        }
        searchResults.innerHTML = results.map((it, i) => {
          const sub = [it.admin1, it.country].filter(Boolean).join(', ');
          return `<button type="button" class="search-result" data-idx="${i}">
            <strong>${it.name}</strong>
            <span>${sub}</span>
          </button>`;
        }).join('');
        searchResults.querySelectorAll('.search-result').forEach(el => {
          el.addEventListener('click', () => pickSearchResult(results[Number(el.dataset.idx)]));
        });
      } catch {
        if (myId === searchRequestId) {
          searchResults.innerHTML = '<div class="search-status">Search failed</div>';
        }
      }
    }

    async function pickSearchResult(item) {
      toggleSearch(false);
      btnSearch.disabled = true;
      try {
        isSearchedLocation = true;
        await loadLocation(item.latitude, item.longitude, item.name);
        document.getElementById('btn-current').hidden = false;
      } catch (e) {
        showError(e.message);
      } finally {
        btnSearch.disabled = false;
      }
    }

    btnSearch.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleSearch();
    });

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 2) {
        searchResults.innerHTML = '';
        return;
      }
      searchTimer = setTimeout(() => runSearch(q), 250);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') toggleSearch(false);
    });

    // Click outside the panel to dismiss.
    document.addEventListener('click', (e) => {
      if (searchPanel.hidden) return;
      if (searchPanel.contains(e.target) || btnSearch.contains(e.target)) return;
      toggleSearch(false);
    });

    // If the browser can't give us a real location (mobile file://, denied
    // permission, no network, etc), fall back to this default.
    const DEFAULT_LOCATION = {
      lat: 54.0758,
      lon: -2.7603,
      place: 'Halton'
    };

    async function init() {
      try {
        const cached = getCachedLocation();
        let lat, lon, place;

        if (cached) {
          ({
            lat,
            lon,
            place
          } = cached);
        } else {
          try {
            ({
              lat,
              lon
            } = await getPosition());
            place = await reverseGeocode(lat, lon);
          } catch {
            ({
              lat,
              lon,
              place
            } = DEFAULT_LOCATION);
          }
          setCachedLocation(lat, lon, place);
        }

        originalLocation = {
          lat,
          lon,
          place
        };
        await loadLocation(lat, lon, place);
      } catch (e) {
        showError(e.message, e.kind);
      }
    }

    // Expose a way to clear the cached location from the console if needed:
    //   localStorage.removeItem('weather-app-location'); location.reload();
    window.clearWeatherLocation = () => {
      localStorage.removeItem(LOCATION_CACHE_KEY);
      location.reload();
    };

    init();
  </script>
</body>
</html>
